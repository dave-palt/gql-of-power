name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (determines next -dev version after release)'
        required: true
        type: choice
        options:
          - minor
          - major

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate versions
        id: versions
        run: |
          CURRENT=$(node -p "require('./package.json').version.replace(/-dev$/, '')")
          BUMP="${{ github.event.inputs.version_bump }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            NEXT_DEV="$((MAJOR + 1)).0.0-dev"
          else
            NEXT_DEV="$MAJOR.$((MINOR + 1)).0-dev"
          fi

          echo "release=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_dev=$NEXT_DEV" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

      - name: Create release branch
        run: |
          BRANCH_NAME="release/${{ steps.versions.outputs.release }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Update package.json to release version
        run: |
          bun run scripts/update-version.ts ${{ steps.versions.outputs.release }}

      - name: Commit release version
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.versions.outputs.release }}"
          git push origin "${{ env.branch }}"

      - name: Create Pull Request to main
        id: create_pr
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.release }}
          BUMP_TYPE: ${{ steps.versions.outputs.bump_type }}
          NEXT_DEV: ${{ steps.versions.outputs.next_dev }}
        with:
          script: |
            const releaseVersion = process.env.RELEASE_VERSION;
            const bumpType = process.env.BUMP_TYPE;
            const nextDev = process.env.NEXT_DEV;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release v${releaseVersion}`,
              head: process.env.branch,
              base: 'main',
              body: `## Release v${releaseVersion}

              This PR prepares the release of version \`${releaseVersion}\`.

              ### Version Bump
              - Type: **${bumpType}**
              - Version: \`${releaseVersion}\`
              - Next develop version: \`${nextDev}\`

              ### Next Steps
              1. Review and merge this PR
              2. The release workflow will automatically:
                 - Tag the release
                 - Publish to npm
                 - Create GitHub release
                 - Merge changes back to develop
                 - Bump develop to \`${nextDev}\`

              **Auto-generated by prepare-release workflow**`,
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [`release:${bumpType}`]
            });

            console.log(`Created PR #${pr.number}`);
            return pr.number;

      - name: Output summary
        run: |
          echo "## Release Preparation Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Version**: ${{ steps.versions.outputs.release }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type**: ${{ steps.versions.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next Dev Version**: ${{ steps.versions.outputs.next_dev }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Merge the PR to trigger the release workflow." >> $GITHUB_STEP_SUMMARY
