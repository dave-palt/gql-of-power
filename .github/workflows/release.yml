name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  check-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    permissions:
      pull-requests: read
    steps:
      - name: Check if push came from a release PR
        id: check
        run: |
          PR_NUMBER=$(echo "${{ github.event.head_commit.message }}" | grep -oP '#\K\d+' | head -1)
          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR detected in commit message. Skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels --jq '.labels[].name')
          echo "PR #$PR_NUMBER labels: $LABELS"

          if echo "$LABELS" | grep -q 'release:major'; then
            BUMP="major"
          elif echo "$LABELS" | grep -q 'release:minor'; then
            BUMP="minor"
          elif echo "$LABELS" | grep -q 'release:patch'; then
            BUMP="patch"
          else
            echo "No release label found on PR #$PR_NUMBER. Skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: check-release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.check-release.outputs.should_release == 'true')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Wait for PostgreSQL
        timeout-minutes: 2
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet, waiting 2 seconds..."
            sleep 2
          done
          echo "ERROR: PostgreSQL failed to become ready within 60 seconds"
          exit 1

      - name: Run tests
        run: bun run test

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public

      - name: Get version from package.json
        id: new_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: Release ${{ steps.new_version.outputs.version }}
          body: 'Release version ${{ steps.new_version.outputs.version }}'

      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.version_bump }}"
          else
            BUMP="${{ needs.check-release.outputs.bump_type }}"
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Merge main back into develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge main --no-edit
          git push origin develop

      - name: Bump develop to next -dev version
        if: steps.bump_type.outputs.bump != 'patch'
        run: |
          CURRENT_VERSION="${{ steps.new_version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          BUMP="${{ steps.bump_type.outputs.bump }}"

          if [ "$BUMP" = "major" ]; then
            NEXT_DEV="$((MAJOR + 1)).0.0-dev"
          else
            NEXT_DEV="$MAJOR.$((MINOR + 1)).0-dev"
          fi

          bun run scripts/update-version.ts "$NEXT_DEV"
          git add package.json
          git commit -m "chore: bump develop to $NEXT_DEV"
          git push origin develop

      - name: Output summary
        run: |
          echo "## Release Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type**: ${{ steps.bump_type.outputs.bump }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Published to npm**: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release**: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Merged to develop**: ✅" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.bump_type.outputs.bump }}" != "patch" ]; then
            echo "- **Develop bumped to next -dev**: ✅" >> $GITHUB_STEP_SUMMARY
          fi
